<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Plant Growth tracker</title>
        <link rel="style sheet"href="style,css">
    </head>
</body>

<h1>Plant Growth Cycle (A to Z)</h1>
<p class="subtitle">Click on any plant to see its full growth journy</p>
<!-- Plant Slection Buttons -->
<div class="Plant Buttons">
 <button onclick="showplant('aloe')">Aloe Vera</button>
 <button onclick="showplant('tulip')">Tulip</button>
 <button onclick="showplant('rose')">Rose</button>
</div>
<!--Growth Process Display Section-->
<div id="growth-section" class="growth-container hidden"></div>
    <h2 id="plant-title">Plant Name</h2>

    <div class="steps-grid"></div>
        <div class="step-card"></div>
        <h3> Step 1 :Seed</h3>
        <p id="step-seed">Seed description</p>
</div>
<div class="step-card"></div>
<h3> Step 2:Sprout</h3>
<p id="step-sprrout">Sprout description</p>
</div>
<div class="step-card"></div>
<h3> Step 3:Growing</h3>
<p id="step-growing">Growing description</p>
</div>
<div class="step-card"></div>
<h3> Step 4: Flower</h3>
<p id=" step-flower"Flower description?></p>
</div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
